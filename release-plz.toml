[workspace]
changelog_config = "cliff.toml"
publish_timeout = "30m"
# Disable semver_check globally — enable per-crate for published libraries.
# semver_check requires building the crate, which can fail on CI for crates
# with native build deps (protobuf, SpacetimeDB, etc).
semver_check = false
git_release_enable = false
git_tag_enable = true
# Skip cargo build verification during publish — the CI workflow handles this.
publish_no_verify = true
pr_labels = ["release"]

# ─── aiOS: kernel contract ────────────────────────────────────────────
[[package]]
name = "aios-protocol"
semver_check = true

[[package]]
name = "aios-events"
semver_check = true

