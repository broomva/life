[workspace]
changelog_config = "cliff.toml"
publish_timeout = "30m"
semver_check = false
git_release_enable = false
git_tag_enable = true
publish_no_verify = true
pr_labels = ["release"]

# ─────────────────────────────────────────────────────────────────────
# BOOTSTRAP NOTE (2026-04-05):
# All crates were published at 0.2.x/0.1.x from pre-monorepo repos,
# then the workspace was restructured (BRO-448) and versions bumped
# to 0.3.0. release-plz cannot diff across the restructure boundary.
#
# Strategy:
#   release = false  → Skip crates already on crates.io at older version
#                      (will be re-enabled after first manual 0.3.0 publish)
#   release = true   → New crates never published (release-plz can handle)
#
# To re-enable a crate after manual publish:
#   1. cargo publish -p <crate>
#   2. Create tag: git tag <crate>-v0.3.0 && git push origin --tags
#   3. Change `release = false` → remove the line (default is true)
# ─────────────────────────────────────────────────────────────────────

