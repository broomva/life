name: Bug Report
description: Report a bug in Life
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as you can.

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which subsystem is affected?
      options:
        - Arcan (agent runtime)
        - Lago (persistence)
        - aiOS (kernel contract)
        - Autonomic (homeostasis)
        - Haima (finance)
        - Anima (identity)
        - Nous (evaluation)
        - Praxis (tool execution)
        - Spaces (networking)
        - Vigil (observability)
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs. what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Clone the repo
        2. Run `cargo test -p ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your Rust version, OS, and any relevant config.
      placeholder: |
        - Rust: 1.85.0
        - OS: macOS 15.4 / Ubuntu 24.04 / etc.
        - Life version: v0.2.0 or commit hash
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false
