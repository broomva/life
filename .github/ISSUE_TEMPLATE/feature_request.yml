name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly.

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which subsystem does this relate to?
      options:
        - Arcan (agent runtime)
        - Lago (persistence)
        - aiOS (kernel contract)
        - Autonomic (homeostasis)
        - Haima (finance)
        - Anima (identity)
        - Nous (evaluation)
        - Praxis (tool execution)
        - Spaces (networking)
        - Vigil (observability)
        - New subsystem
        - Cross-cutting / Multiple
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API sketches, config examples, or architecture ideas.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches? What are the trade-offs?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or references.
    validations:
      required: false
