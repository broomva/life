name: Harness CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout submodules with remotes
        run: |
          git submodule init aiOS arcan lago
          git submodule update --depth 1 aiOS arcan lago

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            aiOS
            arcan
            lago

      - name: Run harness pipeline (smoke → check → test)
        run: make ci
