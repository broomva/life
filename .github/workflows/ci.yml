name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/arcan.git ../arcan
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          # Trim sibling workspaces to only crates needed by nous
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol', 'crates/aios-events', 'crates/aios-policy', 'crates/aios-runtime', 'crates/aios-sandbox', 'crates/aios-tools']),
            ('../arcan/Cargo.toml', ['crates/arcan-core', 'crates/arcan-harness', 'crates/arcan-store', 'crates/arcan-provider']),
            ('../autonomic/Cargo.toml', ['crates/autonomic-core', 'crates/autonomic-controller']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/arcan.git ../arcan
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          # Trim sibling workspaces to only crates needed by nous
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol', 'crates/aios-events', 'crates/aios-policy', 'crates/aios-runtime', 'crates/aios-sandbox', 'crates/aios-tools']),
            ('../arcan/Cargo.toml', ['crates/arcan-core', 'crates/arcan-harness', 'crates/arcan-store', 'crates/arcan-provider']),
            ('../autonomic/Cargo.toml', ['crates/autonomic-core', 'crates/autonomic-controller']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/arcan.git ../arcan
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          # Trim sibling workspaces to only crates needed by nous
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol', 'crates/aios-events', 'crates/aios-policy', 'crates/aios-runtime', 'crates/aios-sandbox', 'crates/aios-tools']),
            ('../arcan/Cargo.toml', ['crates/arcan-core', 'crates/arcan-harness', 'crates/arcan-store', 'crates/arcan-provider']),
            ('../autonomic/Cargo.toml', ['crates/autonomic-core', 'crates/autonomic-controller']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil
          git clone --depth 1 https://github.com/broomva/arcan.git ../arcan
          git clone --depth 1 https://github.com/broomva/autonomic.git ../autonomic
          # Trim sibling workspaces to only crates needed by nous
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol', 'crates/aios-events', 'crates/aios-policy', 'crates/aios-runtime', 'crates/aios-sandbox', 'crates/aios-tools']),
            ('../arcan/Cargo.toml', ['crates/arcan-core', 'crates/arcan-harness', 'crates/arcan-store', 'crates/arcan-provider']),
            ('../autonomic/Cargo.toml', ['crates/autonomic-core', 'crates/autonomic-controller']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check
