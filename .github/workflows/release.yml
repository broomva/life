name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Clean symlinks and tracked-but-gitignored files
        run: |
          # release-plz fails when copying dirs with symlinks pointing outside the repo.
          # Remove ALL tracked symlinks from the index.
          SYMLINKS=$(git ls-files -s | grep "^120000" | awk '{print $4}' || true)
          if [ -n "$SYMLINKS" ]; then
            echo "Removing tracked symlinks:"
            echo "$SYMLINKS" | head -5
            echo "$SYMLINKS" | xargs git rm --cached --quiet
          fi
          # Also remove files that are both committed and gitignored.
          IGNORED=$(git ls-files -ci --exclude-standard 2>/dev/null || true)
          if [ -n "$IGNORED" ]; then
            echo "Removing tracked-but-gitignored files:"
            echo "$IGNORED" | head -5
            echo "$IGNORED" | xargs git rm --cached --quiet
          fi

      - uses: Swatinem/rust-cache@v2

      - name: Create release PR
        continue-on-error: true
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish to crates.io
        continue-on-error: true
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
