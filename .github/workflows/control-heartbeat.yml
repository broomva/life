name: Control Heartbeat

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout submodules with remotes
        run: |
          git submodule update --init --depth 1 aiOS arcan lago autonomic spaces

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Configure hooks path
        run: git config core.hooksPath .githooks

      - name: Run heartbeat
        run: ./scripts/control/heartbeat.sh
