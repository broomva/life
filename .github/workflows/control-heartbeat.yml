name: Control Heartbeat

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout submodules with remotes
        run: |
          git submodule update --init --depth 1 aiOS arcan lago autonomic spaces praxis vigil anima haima nous

      - name: Install protoc and lld
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Configure hooks path
        run: git config core.hooksPath .githooks

      - name: Run heartbeat
        run: ./scripts/control/heartbeat.sh
