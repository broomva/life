name: Control Nightly Audit

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout submodules with remotes
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1 aiOS arcan lago autonomic spaces

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Baseline audit
        run: scripts/audit_control.sh .

      - name: Strict audit
        run: scripts/audit_control.sh . --strict

      - name: Capture audit results
        if: always()
        run: |
          echo "## Nightly Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          scripts/audit_control.sh . 2>&1 | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          scripts/audit_control.sh . --strict 2>&1 | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY || true
