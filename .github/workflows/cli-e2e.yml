name: CLI E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  cli-e2e:
    runs-on: ubuntu-latest
    env:
      APP_CLI_BIN: ${{ vars.APP_CLI_BIN }}
      APP_CLI_VERSION_ARG: ${{ vars.APP_CLI_VERSION_ARG }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Build CLI binaries
        run: |
          if [ -d arcan ]; then (cd arcan && cargo build --workspace --quiet); fi
          if [ -d lago ]; then (cd lago && cargo build --workspace --quiet); fi

      - name: Run CLI e2e wrapper
        run: ./scripts/control/cli_e2e.sh
