name: CLI E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - name: Checkout submodules with remotes
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1 aiOS arcan lago autonomic spaces praxis vigil nous anima haima

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            aiOS -> .target
            arcan -> .target
            lago -> .target
            autonomic -> .target
            praxis -> .target
            vigil -> .target
            nous -> .target
            anima -> .target
            haima -> .target

      - name: Run CLI E2E tests
        run: ./scripts/control/cli_e2e.sh
