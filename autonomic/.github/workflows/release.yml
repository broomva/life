name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/vigil.git ../vigil

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Tier 1: core types
          cargo publish -p autonomic-core || true
          sleep 30

          # Tier 2: depends on core
          cargo publish -p autonomic-controller || true
          cargo publish -p autonomic-lago || true
          sleep 30

          # Tier 3: API + daemon
          cargo publish -p autonomic-api || true
          cargo publish -p autonomicd || true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
