[package]
name = "life-cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
authors = ["Broomva <carlos@broomva.tech>"]
repository = "https://github.com/broomva/life"
description = "Production agent deployment pipeline for Life Agent OS"
keywords = ["agent", "deployment", "orchestration", "railway", "life"]
categories = ["command-line-utilities"]

[[bin]]
name = "life"
path = "src/main.rs"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
dbg_macro = "warn"
print_stdout = "warn"
print_stderr = "warn"
todo = "warn"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
tabled = "0.18"
uuid = { version = "1", features = ["v4"] }
dirs = "6"

# Relay daemon (local agent ↔ broomva.tech bridge)
life-relayd = { path = "../relay/crates/life-relayd" }
life-relay-core = { path = "../relay/crates/life-relay-core" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
