# Opsis feed configuration
#
# Each [[feeds]] entry declares a data feed.
# Feeds with [feeds.normalize] use the generic poll connector (no Rust code).
# Feeds without it use registered custom implementations (by name).

# ── Custom feeds (Rust implementations) ─────────────────────────────

[[feeds]]
name = "usgs-earthquake"
connector = "poll"
url = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson"
interval_secs = 30
schema = "usgs.geojson.v1"
domain = "Emergency"

[[feeds]]
name = "open-meteo"
connector = "poll"
url = "https://api.open-meteo.com/v1/forecast"
interval_secs = 300
schema = "openmeteo.current.v1"
domain = "Weather"

# ── Generic feeds (declarative, no Rust code) ───────────────────────

[[feeds]]
name = "usgs-significant"
connector = "poll"
url = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/significant_month.geojson"
interval_secs = 900
schema = "usgs.significant.v1"
domain = "Emergency"

[feeds.normalize]
events_path = "$.features[*]"
summary = "$.properties.place"
severity = "$.properties.mag"
severity_range = [0, 10]
lat = "$.geometry.coordinates[1]"
lon = "$.geometry.coordinates[0]"
tags = ["earthquake", "significant"]

[[feeds]]
name = "github-events"
connector = "poll"
url = "https://api.github.com/events"
interval_secs = 120
schema = "github.events.v1"
domain = "Technology"

[feeds.normalize]
events_path = "$[*]"
summary = "$.type"
tags = ["github", "opensource"]

[[feeds]]
name = "iss-position"
connector = "poll"
url = "http://api.open-notify.org/iss-now.json"
interval_secs = 30
schema = "iss.position.v1"
domain = "Space"

[feeds.normalize]
summary = "$.iss_position"
lat = "$.iss_position.latitude"
lon = "$.iss_position.longitude"
tags = ["iss", "space", "orbit"]

# ── OpenSky Network (Flight Tracking) ──────────────────────────────
# Live aircraft state vectors. Custom feed (array-of-arrays format).
# Free, no auth, 10s rate limit. Bbox reduces payload size for Railway.

[[feeds]]
name = "opensky-flights"
connector = "poll"
url = "https://opensky-network.org/api/states/all?lamin=10&lomin=-140&lamax=72&lomax=60"
interval_secs = 30
schema = "opensky.states.v1"
domain = "Infrastructure"

# ── AISStream.io (Ship Tracking) ───────────────────────────────────
# Real-time AIS position reports via WebSocket (poll-batch mode).
# Requires AISSTREAM_API_KEY env var. Free tier available.
# Gracefully skips if API key not set.

[[feeds]]
name = "ais-ships"
connector = "poll"
url = "wss://stream.aisstream.io/v0/stream"
interval_secs = 30
schema = "aisstream.position.v1"
domain = "Ocean"

# ── NASA FIRMS (Active Fires) ──────────────────────────────────────
# 800+ fire hotspots worldwide from VIIRS satellite. CSV → custom feed.
# Requires FIRMS_MAP_KEY env var (free registration at FIRMS website).
# Gracefully skips if key not set.

[[feeds]]
name = "nasa-firms"
connector = "poll"
url = "https://firms.modaps.eosdis.nasa.gov/api/area/csv"
interval_secs = 600
schema = "nasa.firms.v1"
domain = "Emergency"

# ── IODA (Internet Outages) ───────────────────────────────────────
# Country-level internet connectivity alerts. Free, no auth.
# Correlates with conflict, disasters, political events.

[[feeds]]
name = "ioda-outages"
connector = "poll"
url = "https://api.ioda.inetintel.cc.gatech.edu/v2/outages/alerts"
interval_secs = 300
schema = "ioda.outages.v1"
domain = "Infrastructure"

# ── Polymarket (Prediction Markets) ───────────────────────────────
# Real-money forecasting of geopolitical events. Free, no auth.
# Events geo-pinned by parsing country from question text.

[[feeds]]
name = "polymarket"
connector = "poll"
url = "https://gamma-api.polymarket.com/markets"
interval_secs = 300
schema = "polymarket.markets.v1"

# ── NASA EONET (Earth Observatory Natural Events) ──────────────────
# Real-time natural events: wildfires, storms, volcanoes, icebergs.
# Free, no auth, returns GeoJSON-like with coordinates + magnitude.

[[feeds]]
name = "nasa-eonet"
connector = "poll"
url = "https://eonet.gsfc.nasa.gov/api/v3/events?limit=50&status=open"
interval_secs = 600
schema = "nasa.eonet.v3"
domain = "Emergency"

[feeds.normalize]
events_path = "$.events[*]"
summary = "$.title"
severity = "$.geometry[0].magnitudeValue"
severity_range = [0, 10000]
lat = "$.geometry[0].coordinates[1]"
lon = "$.geometry[0].coordinates[0]"
tags = ["nasa", "eonet", "natural-events"]

# ── GDELT feeds (BRO-509) ──────────────────────────────────────────
# GDELT DOC API v2 returns global news articles matching query terms.
# Articles lack coordinates — events flow through Gaia for domain-level
# anomaly detection but don't pin to globe. Rate limit: 1 req / 5s.

[[feeds]]
name = "gdelt-conflict"
connector = "poll"
url = "https://api.gdeltproject.org/api/v2/doc/doc?query=conflict%20OR%20war%20OR%20military%20OR%20attack&mode=ArtList&maxrecords=25&format=json"
interval_secs = 900
schema = "gdelt.doc.v2"
domain = "Conflict"

[feeds.normalize]
events_path = "$.articles[*]"
summary = "$.title"
tags = ["gdelt", "conflict", "news"]

[[feeds]]
name = "gdelt-politics"
connector = "poll"
url = "https://api.gdeltproject.org/api/v2/doc/doc?query=election%20OR%20sanctions%20OR%20diplomacy%20OR%20treaty&mode=ArtList&maxrecords=25&format=json"
interval_secs = 900
schema = "gdelt.doc.v2"
domain = "Politics"

[feeds.normalize]
events_path = "$.articles[*]"
summary = "$.title"
tags = ["gdelt", "politics", "news"]

[[feeds]]
name = "gdelt-trade"
connector = "poll"
url = "https://api.gdeltproject.org/api/v2/doc/doc?query=trade%20OR%20tariff%20OR%20export%20OR%20import%20OR%20economic%20crisis&mode=ArtList&maxrecords=25&format=json"
interval_secs = 900
schema = "gdelt.doc.v2"
domain = "Trade"

[feeds.normalize]
events_path = "$.articles[*]"
summary = "$.title"
tags = ["gdelt", "trade", "economics"]
