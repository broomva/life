name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          # Trim sibling workspaces to only crates anima directly needs
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol']),
            ('../haima/Cargo.toml', ['crates/haima-core', 'crates/haima-wallet']),
            ('../lago/Cargo.toml', ['crates/lago-core', 'crates/lago-journal', 'crates/lago-store']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          # Trim sibling workspaces to only crates anima directly needs
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol']),
            ('../haima/Cargo.toml', ['crates/haima-core', 'crates/haima-wallet']),
            ('../lago/Cargo.toml', ['crates/lago-core', 'crates/lago-journal', 'crates/lago-store']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          # Trim sibling workspaces to only crates anima directly needs
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol']),
            ('../haima/Cargo.toml', ['crates/haima-core', 'crates/haima-wallet']),
            ('../lago/Cargo.toml', ['crates/lago-core', 'crates/lago-journal', 'crates/lago-store']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/broomva/aiOS.git ../aiOS
          git clone --depth 1 https://github.com/broomva/lago.git ../lago
          git clone --depth 1 https://github.com/broomva/haima.git ../haima
          # Trim sibling workspaces to only crates anima directly needs
          python3 -c "
          import re
          for path, members in [
            ('../aiOS/Cargo.toml', ['crates/aios-protocol']),
            ('../haima/Cargo.toml', ['crates/haima-core', 'crates/haima-wallet']),
            ('../lago/Cargo.toml', ['crates/lago-core', 'crates/lago-journal', 'crates/lago-store']),
          ]:
            with open(path) as f: c = f.read()
            ml = ', '.join(f'\"{m}\"' for m in members)
            c = re.sub(r'members\s*=\s*\[.*?\]', f'members = [{ml}]', c, flags=re.DOTALL)
            with open(path,'w') as f: f.write(c)
          "
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check
