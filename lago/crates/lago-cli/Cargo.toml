[package]
name = "lago"
description = "CLI tool for the Lago event-sourced agent runtime"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[[bin]]
name = "lago"
path = "src/main.rs"

[dependencies]
lago-core.workspace = true
lago-journal.workspace = true
lago-store.workspace = true
lago-fs.workspace = true
lago-ingest.workspace = true
lago-api.workspace = true
lago-policy.workspace = true
lagod = { version = "0.2.0", path = "../lagod" }
reqwest = { version = "0.12", features = ["json"] }
urlencoding = "2"
clap.workspace = true
tokio.workspace = true
toml.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tempfile = "3"
